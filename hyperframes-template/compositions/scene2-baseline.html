<template id="scene2-baseline-template">
  <div
    data-composition-id="scene2-baseline"
    data-start="8.32"
    data-width="1080"
    data-height="1920"
    data-duration="9.16"
  >
    <!-- Fullscreen overlay (local 0–2.18s, face FULLSCREEN) -->
    <div class="s2-stamp" id="s2-stamp">
      <div class="s2-not" id="s2-not">NOT JUST FAMILIAR</div>
      <div class="s2-certified" id="s2-certified">CERTIFIED</div>
    </div>

    <!-- Panel (local 2.18s+, face BOTTOM) -->
    <div class="s2-panel" id="s2-panel">
      <div class="s2-label">BASELINE STACK</div>
      <div class="s2-tools">
        <div class="s2-tool" id="s2-t1"><span class="s2-dot"></span>GHL</div>
        <div class="s2-tool" id="s2-t2"><span class="s2-dot"></span>Slack</div>
        <div class="s2-tool" id="s2-t3"><span class="s2-dot"></span>Google Sheets</div>
        <div class="s2-tool" id="s2-t4"><span class="s2-dot"></span>Notion</div>
        <div class="s2-tool" id="s2-t5"><span class="s2-dot"></span>Loom</div>
      </div>
    </div>

    <style>
      [data-composition-id="scene2-baseline"] {
        position: absolute;
        inset: 0;
      }
      [data-composition-id="scene2-baseline"] .s2-stamp {
        position: absolute;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: flex-start;
        padding-top: 80px;
        gap: 20px;
        background: rgba(7, 18, 28, 0.72);
        pointer-events: none;
        opacity: 0;
      }
      [data-composition-id="scene2-baseline"] .s2-not {
        font-family: "Roboto Mono", monospace;
        font-weight: 500;
        font-size: 52px;
        letter-spacing: 0.12em;
        color: #96a2b6;
        clip-path: inset(0 100% 0 0);
      }
      [data-composition-id="scene2-baseline"] .s2-certified {
        font-family: var(--font-display-slam);
        font-weight: 900;
        font-size: 180px;
        letter-spacing: -0.04em;
        color: #37bdf8;
        line-height: 0.9;
        text-align: center;
        opacity: 0;
        transform: scale(1.3);
      }
      [data-composition-id="scene2-baseline"] .s2-panel {
        position: absolute;
        top: 0; left: 0;
        width: 1080px; height: 960px;
        background: #07121c;
        display: flex;
        flex-direction: column;
        align-items: flex-start;
        justify-content: center;
        gap: 32px;
        padding: 60px 90px;
        box-sizing: border-box;
        font-family: "Montserrat", sans-serif;
        opacity: 0;
      }
      [data-composition-id="scene2-baseline"] .s2-label {
        font-family: "Roboto Mono", monospace;
        font-weight: 500;
        font-size: 38px;
        letter-spacing: 0.18em;
        color: #96a2b6;
      }
      [data-composition-id="scene2-baseline"] .s2-tools {
        display: flex;
        flex-direction: column;
        gap: 22px;
        width: 100%;
      }
      [data-composition-id="scene2-baseline"] .s2-tool {
        display: flex;
        align-items: center;
        gap: 28px;
        font-weight: 900;
        font-size: 76px;
        letter-spacing: -0.02em;
        color: #ffffff;
        clip-path: inset(0 100% 0 0);
      }
      [data-composition-id="scene2-baseline"] .s2-dot {
        display: inline-block;
        width: 18px;
        height: 18px;
        border-radius: 50%;
        background: #37bdf8;
        flex-shrink: 0;
      }
    </style>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      (function () {
        const scope = '[data-composition-id="scene2-baseline"] ';
        const tl = gsap.timeline({ paused: true });

        // Phase 1: fullscreen "CERTIFIED" stamp (local 0–2.18s)
        tl.to(scope + '.s2-stamp', { opacity: 1, duration: 0.2, ease: 'power2.out' }, 0.1);
        tl.to(scope + '.s2-not', { clipPath: 'inset(0 0% 0 0)', duration: 0.35, ease: 'power3.out' }, 0.25);
        tl.to(scope + '.s2-certified', { opacity: 1, scale: 1, duration: 0.4, ease: 'back.out(1.8)' }, 0.75);
        tl.to(scope + '.s2-certified', { scale: 1.06, duration: 0.1, ease: 'power2.out' }, 1.1);
        tl.to(scope + '.s2-certified', { scale: 1, duration: 0.18, ease: 'power2.inOut' }, 1.2);
        tl.to(scope + '.s2-stamp', { opacity: 0, duration: 0.22, ease: 'power2.in' }, 1.9);

        // Phase 2: tool list (local 2.18s = face BOTTOM)
        // Tool reveal times aligned to absolute transcript positions minus scene start (8.32):
        // GHL abs 10.52 → local 2.20, Slack 11.60 → 3.28, Sheets 12.57 → 4.25,
        // Notion 13.20 → 4.88, Loom estimated ~14.20 → 5.88
        tl.to(scope + '.s2-panel', { opacity: 1, duration: 0.25, ease: 'power2.out' }, 2.18);

        const tools = [
          { id: '#s2-t1', at: 2.20 },
          { id: '#s2-t2', at: 3.28 },
          { id: '#s2-t3', at: 4.25 },
          { id: '#s2-t4', at: 4.88 },
          { id: '#s2-t5', at: 5.88 },
        ];
        tools.forEach(function (t) {
          tl.to(scope + ' ' + t.id, {
            clipPath: 'inset(0 0% 0 0)', duration: 0.28, ease: 'power3.out',
          }, t.at);
          tl.to(scope + ' ' + t.id + ' .s2-dot', {
            scale: 1.6, backgroundColor: '#f09025', duration: 0.13, ease: 'back.out(2)',
          }, t.at);
          tl.to(scope + ' ' + t.id + ' .s2-dot', {
            scale: 1, backgroundColor: '#37bdf8', duration: 0.22, ease: 'power2.inOut',
          }, t.at + 0.13);
        });

        tl.set({}, {}, 9.16);
        window.__timelines = window.__timelines || {};
        window.__timelines['scene2-baseline'] = tl;
      })();
    </script>
  </div>
</template>
