    <style>
      [data-composition-id="scene4-tier2"] {

        inset: 0;
      }
      /* Fullscreen reveal */
      [data-composition-id="scene4-tier2"] .s4-reveal {
        position: absolute;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: flex-start;
        padding-top: 80px;
        gap: 12px;
        background: rgba(7, 18, 28, 0.78);
        opacity: 0;
      }
      [data-composition-id="scene4-tier2"] .s4-then {
        font-family: "Roboto Mono", monospace;
        font-weight: 500;
        font-size: 46px;
        letter-spacing: 0.14em;
        color: #96a2b6;
        clip-path: inset(0 100% 0 0);
      }
      [data-composition-id="scene4-tier2"] .s4-strongbase {
        font-family: var(--font-display-slam);
        font-weight: 900;
        font-size: 160px;
        line-height: 0.9;
        letter-spacing: -0.04em;
        color: #f09025;
        text-align: center;
        opacity: 0;
        transform: scale(0.8);
      }
      /* Tool panel */
      [data-composition-id="scene4-tier2"] .s4-panel {
        position: absolute;
        top: 0; left: 0;
        width: 1080px; height: 960px;
        background: #07121c;
        display: flex;
        flex-direction: column;
        align-items: flex-start;
        justify-content: center;
        gap: 24px;
        padding: 50px 80px;

        font-family: "Roboto Mono", monospace;
        font-weight: 500;

      }
      [data-composition-id="scene4-tier2"] .s4-tools {
        display: flex;
        flex-direction: column;
        gap: 18px;
        width: 100%;
      }
      [data-composition-id="scene4-tier2"] .s4-tool {
        display: flex;
        align-items: baseline;
        gap: 20px;
        opacity: 0;
        transform: scale(0.85) translateY(12px);

      [data-composition-id="scene4-tier2"] .s4-dot {
        display: inline-block;

        border-radius: 50%;

      [data-composition-id="scene4-tier2"] .s4-name {

      [data-composition-id="scene4-tier2"] .s4-broll-icon {

      [data-composition-id="scene4-tier2"] .s4-broll-text {

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      (function () {
        const scope = '[data-composition-id="scene4-tier2"] ';
        const tl = gsap.timeline({ paused: true });

        // Phase 1: "STRONG BASE" fullscreen (0–3.4s)
        tl.to(scope + '.s4-reveal', { opacity: 1, duration: 0.2, ease: 'power2.out' }, 0.1);
        tl.to(scope + '.s4-then', { clipPath: 'inset(0 0% 0 0)', duration: 0.35, ease: 'power3.out' }, 0.35);
        tl.to(scope + '.s4-strongbase', { opacity: 1, scale: 1, duration: 0.5, ease: 'back.out(1.6)' }, 0.9);
        tl.to(scope + '.s4-reveal', { opacity: 0, duration: 0.3, ease: 'power2.in' }, 3.05);

        // Phase 2: tier-2 tools panel (local 3.4s = face BOTTOM)
        tl.to(scope + '.s4-panel', { opacity: 1, duration: 0.28, ease: 'power2.out' }, 3.4);
        tl.to(scope + '.s4-label', { opacity: 1, duration: 0.3, ease: 'power2.out' }, 3.6);

        // Tools slam in synced to transcript (absolute times minus scene start 21.60):
        // Make.com abs ~29.47 → local 7.87
        // ChatGPT abs ~30.64 → local 9.04
        // Super Whisper abs ~32.72 → local 11.12
        // Metricool abs ~35.50 → local 13.90
        const tools = [
          { id: '#s4-t1', at: 7.87 },
          { id: '#s4-t2', at: 9.04 },
          { id: '#s4-t3', at: 11.12 },
          { id: '#s4-t4', at: 13.90 },
        ];
        tools.forEach(function (t) {
          tl.to(scope + ' ' + t.id, {
            opacity: 1, scale: 1, y: 0, duration: 0.35, ease: 'back.out(3)',
          }, t.at);
          tl.to(scope + ' ' + t.id + ' .s4-dot', {
            scale: 1.8, backgroundColor: '#f09025', duration: 0.12, ease: 'back.out(2)',
          }, t.at);
          tl.to(scope + ' ' + t.id + ' .s4-dot', {
            scale: 1, backgroundColor: '#37bdf8', duration: 0.22, ease: 'power2.inOut',
          }, t.at + 0.12);
        });

        // B-roll card floats in after tools start appearing
        tl.to(scope + '.s4-broll', { opacity: 1, y: 0, duration: 0.4, ease: 'power2.out' }, 9.5);

        tl.set({}, {}, 16.04);
        window.__timelines = window.__timelines || {};
        window.__timelines['scene4-tier2'] = tl;
      })();
    </script>
  </div>
</template>
