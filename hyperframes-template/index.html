<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1080, height=1920" />
    <title>FF Pilot — VA Tech Stack v2</title>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;500;700;900&family=Roboto+Mono:wght@400;500;700&family=Space+Grotesk:wght@700;900&family=Outfit:wght@700;900&display=block"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="assets/brand-tokens.css" />
    <link rel="stylesheet" href="styles/typography.css" />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        width: 1080px;
        height: 1920px;
        overflow: hidden;
        background: #07121c;
        font-family: "Montserrat", sans-serif;
        color: #ffffff;
      }
      #face-wrapper {
        position: absolute;
        top: 0;
        left: 0;
        width: 1920px;
        height: 1080px;
        transform-origin: 0 0;
        /* Initial: BOTTOM mode. scale 0.5625 renders 1920x1080 at 1080x607.5;
           translate(0, 1136px) centers it in the bottom 960px half. */
        transform: translate(0px, 1136px) scale(0.5625);
        z-index: 0;
      }
      #face-video {
        display: block;
        width: 100%;
        height: 100%;
        object-fit: cover;
        transform-origin: center center;
        filter: contrast(1.08) saturate(1.08) brightness(0.97);
      }
      #face-wrapper::after {
        content: "";
        position: absolute;
        inset: 0;
        pointer-events: none;
        background: radial-gradient(
          ellipse at center,
          transparent 55%,
          rgba(7, 18, 28, 0.35) 85%,
          rgba(7, 18, 28, 0.7) 100%
        );
      }
      .scene-layer {
        position: absolute;
        top: 0;
        left: 0;
        width: 1080px;
        height: 1920px;
      }
    </style>
  </head>
  <body>
    <div
      id="root"
      data-composition-id="main"
      data-start="0"
      data-duration="73.30"
      data-width="1080"
      data-height="1920"
    >
      <!-- Ambient background -->
      <div
        id="ambient-bg"
        class="scene-layer"
        data-composition-id="ambient-bg"
        data-composition-src="compositions/ambient-bg.html"
        data-start="0"
        data-duration="73.30"
        data-track-index="3"
        data-width="1080"
        data-height="1920"
      ></div>

      <!-- Face video -->
      <div id="face-wrapper">
        <video
          id="face-video"
          data-start="0"
          data-duration="69.80"
          data-track-index="0"
          src="assets/raw-trim-v2.mp4"
          muted
          playsinline
        ></video>
      </div>

      <!-- Seam treatment -->
      <div
        id="seam-treatment"
        class="scene-layer"
        data-composition-id="seam-treatment"
        data-composition-src="compositions/seam-treatment.html"
        data-start="0"
        data-duration="73.30"
        data-track-index="5"
        data-width="1080"
        data-height="1920"
      ></div>

      <!-- Audio -->
      <audio
        id="face-audio"
        data-start="0"
        data-duration="69.80"
        data-track-index="4"
        data-volume="1"
        src="assets/raw-trim-v2.mp4"
      ></audio>

      <!-- Background music -->
      <audio
        id="music-bg"
        data-start="0"
        data-duration="73.30"
        data-track-index="6"
        data-volume="0.08"
        src="assets/music.mp3"
      ></audio>

      <!-- Scene 1: Hook (0–8.32s) -->
      <div
        id="scene-1"
        class="scene-layer"
        data-composition-id="scene1-hook"
        data-composition-src="compositions/scene1-hook.html"
        data-start="0"
        data-duration="8.32"
        data-track-index="1"
        data-width="1080"
        data-height="1920"
      ></div>

      <!-- Scene 2: Baseline stack (8.32–17.48s) -->
      <div
        id="scene-2"
        class="scene-layer"
        data-composition-id="scene2-baseline"
        data-composition-src="compositions/scene2-baseline.html"
        data-start="8.32"
        data-duration="9.16"
        data-track-index="1"
        data-width="1080"
        data-height="1920"
      ></div>

      <!-- Scene 3: Minimum gate (17.48–21.60s) -->
      <div
        id="scene-3"
        class="scene-layer"
        data-composition-id="scene3-minimum"
        data-composition-src="compositions/scene3-minimum.html"
        data-start="17.48"
        data-duration="4.12"
        data-track-index="1"
        data-width="1080"
        data-height="1920"
      ></div>

      <!-- Scene 4: Strong base + tier-2 tools (21.60–37.64s) -->
      <div
        id="scene-4"
        class="scene-layer"
        data-composition-id="scene4-tier2"
        data-composition-src="compositions/scene4-tier2.html"
        data-start="21.60"
        data-duration="16.04"
        data-track-index="1"
        data-width="1080"
        data-height="1920"
      ></div>

      <!-- Scene 5: Keep up vs build ahead (37.64–56.20s) -->
      <div
        id="scene-5"
        class="scene-layer"
        data-composition-id="scene5-contrast"
        data-composition-src="compositions/scene5-contrast.html"
        data-start="37.64"
        data-duration="18.56"
        data-track-index="1"
        data-width="1080"
        data-height="1920"
      ></div>

      <!-- Scene 6: Close / incubator CTA (56.20–69.80s) -->
      <div
        id="scene-6"
        class="scene-layer"
        data-composition-id="scene6-close"
        data-composition-src="compositions/scene6-close.html"
        data-start="56.20"
        data-duration="13.60"
        data-track-index="1"
        data-width="1080"
        data-height="1920"
      ></div>

      <!-- Scene 7: CTA (69.80–73.30s) -->
      <div
        id="scene-7"
        class="scene-layer"
        data-composition-id="scene7-cta"
        data-composition-src="compositions/scene7-cta.html"
        data-start="69.80"
        data-duration="3.50"
        data-track-index="1"
        data-width="1080"
        data-height="1920"
      ></div>

      <!-- Float assets — B-roll overlays -->
      <div
        class="scene-layer"
        data-composition-id="float-broll-1"
        data-composition-src="compositions/float-broll-1.html"
        data-start="10.5"
        data-duration="4.0"
        data-track-index="7"
        data-width="1080"
        data-height="1920"
      ></div>
      <div
        class="scene-layer"
        data-composition-id="float-broll-2"
        data-composition-src="compositions/float-broll-2.html"
        data-start="29.0"
        data-duration="4.0"
        data-track-index="7"
        data-width="1080"
        data-height="1920"
      ></div>
      <div
        class="scene-layer"
        data-composition-id="float-broll-3"
        data-composition-src="compositions/float-broll-3.html"
        data-start="42"
        data-duration="4.81"
        data-track-index="7"
        data-width="1080"
        data-height="1920"
      ></div>

      <!-- Captions -->
      <div
        id="captions"
        class="scene-layer"
        data-composition-id="captions"
        data-composition-src="compositions/captions.html"
        data-start="0"
        data-duration="73.30"
        data-track-index="2"
        data-width="1080"
        data-height="1920"
      ></div>
    </div>

    <script>
      window.__timelines = window.__timelines || {};
      const mainTl = gsap.timeline({ paused: true });

      // Face-wrapper modes.
      //   BOTTOM: scale 0.5625 → 1080x607.5, y=1136 (centered in bottom 960px half)
      //   FULLSCREEN: scale 1.2, x=-612, y=312 (shows shoulders + breathing room, 312px dark bars top/bottom)
      const BOTTOM = { x: 0, y: 1136, scale: 0.5625 };
      const FULLSCREEN = { x: -612, y: 312, scale: 1.2 };
      const MODE_DUR = 0.32;

      mainTl.set("#face-wrapper", BOTTOM, 0);

      // Face mode transitions — edit this array to change all timing-dependent compositions.
      // seam-treatment.html and captions.html both derive their windows from this at runtime.
      // No face-zoom transitions — subject framing stays stable throughout.
      // Emphasis comes from layout, text animation, and timing — not zoom pushes.
      const FACE_TRANSITIONS = [];

      // Expose for seam-treatment.html auto-derive
      window.__faceModeTransitions = FACE_TRANSITIONS.map(({ t, mode }) => ({
        t,
        isBottom: mode === BOTTOM,
      }));
      window.__totalDuration = 73.30;

      FACE_TRANSITIONS.forEach(({ t, mode }) => {
        mainTl.to(
          "#face-wrapper",
          { ...mode, duration: MODE_DUR, ease: "expo.inOut" },
          t - 0.15,
        );
      });

      // Ken Burns — subtle zoom only during BOTTOM windows (not compounded by FULLSCREEN scale).
      mainTl.to(
        "#face-video",
        { scale: 1.008, duration: 73.30, ease: "none" },
        0,
      );

      mainTl.set({}, {}, 73.30);
      window.__timelines["main"] = mainTl;
    </script>
  </body>
</html>
